<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skills Test</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: rgb(194, 202, 248); /* light background */
    }
    #loginBox {
      text-align: center;
      margin-top: 10%;
      border: 3px solid #0d6efd; /* blue outline */
      border-radius: 8px;
      padding: 20px;
      max-width: 500px;
      width: 80%;
      margin-left: auto;
      margin-right: auto;
      background-color: #fff; /* white inside */
    }
    .form-control {
      max-width: 350px;
      margin: 10px auto; /* center inputs */
    }
    .btn {
      max-width: 200px;
      margin: 10px auto;
      display: block;
      width: 400px;
    }
    .logo {
      display: block;       
      margin: 0 auto 15px;  
      max-width: 175px;     
      height: auto;        
    }
  </style>
</head>
<body>
  <div id="loginBox">
    <form>
      <img src="logo.png" alt="School logo" class="logo">

      <h1 class="text-primary mb-4">Login Portal</h1>

      <label for="uname">Username</label>
      <input type="text" id="uname" class="form-control" placeholder="Type in username" required>

      <label for="pwd">Password</label>
      <input type="password" id="pwd" class="form-control" placeholder="Type in password" required>

      <p id="display" class="text-danger"></p>

       <div class="row">
          <div class="col">
            <button type="button" id="loginBTN" class="btn btn-primary" onclick="authenticate()">Login</button>
          </div>
       <div class="col">
            <button type="reset" id="cancel" class="btn btn-secondary">Cancel</button>
       </div>
      </div>
      <p><a href="https://docs.google.com/document/d/1eTYshIpP1OVSiD_uPD03n-_rkG1Ueja4QEy_UxGkfjA/edit?tab=t.0">Forgot username and/or password?</a></p>
    </form>
  </div>

  <script>
    let attempt_counter = 0;

    function authenticate() {
      let uname = document.getElementById("uname").value;
      let pwd = document.getElementById("pwd").value;

      if (uname === "ICTGROUP4" && pwd === "SirRenn") {
        alert("Welcome " + uname + "!");
        attempt_counter = 0; // reset attempts
        document.getElementById("display").innerHTML = "";
        window.location.href = "dashboard.html";
      } else {
        attempt_counter++;
        document.getElementById("display").innerHTML =
          "Incorrect username and/or password. Attempt " + attempt_counter + " of 3";

        if (attempt_counter >= 3) {
          alert("Access denied. Account locked after 3 attempts!");
          document.getElementById("loginBTN").disabled = true;
        }
      }
    }
  </script>
</body>
</html>
