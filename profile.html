<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Information</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #ffffff;
    }

    .sidebar {
      background-color: #ffffff;
      min-height: 100vh;
      height: auto;
      width: 300px;
      box-shadow: 2px 0 5px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .logo {
      height: 200px;
      width: 200px;
      display: block;
      margin-bottom: 20px;
    }

    .footer {
      background-color: #ffffff; 
      color: #0d6efd;            
      width: 100%;
      padding: 10px 0;
    }

    .student-info {
      background-color: #ffffff;   
      border: 2px solid #0d6efd;   
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      color: #000000;              
    }

    .student-info h4 {
      color: #0d6efd;              
      margin-bottom: 15px;
    }

    .student-info p {
      margin: 5px 0;
    }

    .nav-link {
      margin: 10px 0;
      font-weight: 500;
      color: #000000;         
      text-decoration: none;
      display: block;
      text-align: center;
      border-radius: 5px;
      padding: 8px 12px;
    }

    .nav-link:hover {
      color: #0d6efd;
      background-color: #f8f9fa;
      box-shadow: 0 4px 6px rgba(0,0,0,0.15);
    }

    #profilePreview {
      width: 150px;
      height: 150px;
      border-radius: 50%;    
      object-fit: cover;      
      border: 3px solid #0d6efd;
      margin-bottom: 15px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }
  </style>
</head>
<body>
  <div class="container-fluid">
    <div class="row">
      <div class="col-md-3 sidebar text-dark p-3">
        <img src="logo.png" alt="School logo" class="rounded-circle logo">
        <a class="nav-link" href="dashboard.html">DASHBOARD</a>
        <a class="nav-link" href="notebooks.html">VIRTUAL NOTEBOOKS</a>
        <a class="nav-link" href="tasks.html">TASKS</a>
        <a class="nav-link" href="profile.html">PROFILE</a>
        <a class="nav-link" href="index.html">LOGOUT</a>
      </div>

      <div class="col-md-9 mt-4">
        <h1 class="text-primary text-center mb-4">SCHOOL PROFILE</h1>
        
        <div class="student-info">
          <img id="profilePreview" src="https://via.placeholder.com/150/0d6efd/ffffff?text=+" alt="" class="profile-img">
          <div class="input-group mb-3">
            <input type="file" class="form-control form-control-sm" id="fileInput" accept="image/*">
          </div>

          <h4>Student Information</h4>
          <p><b>Full Name:</b> Aryana John Fernandez</p>
          <p><b>Grade Level & Section:</b> Grade 9 - Topaz</p>
          <p><b>ID Number:</b> AJ-6767</p>
          <p><b>Gender:</b> Female</p>
        </div>

        <footer class="footer text-center mt-5">© 4Q Project | TJS, FEF, ACV</footer>
      </div>
    </div>
  </div>

  <script>
    const fileInput = document.getElementById("fileInput");
    const profilePreview = document.getElementById("profilePreview");

    fileInput.addEventListener("change", function(event) {
      const file = event.target.files[0];
      if (file) {
        const imageURL = URL.createObjectURL(file);
        profilePreview.src = imageURL;
      }
    });
  </script>
</body>
</html>
